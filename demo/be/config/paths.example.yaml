# Demo backend — path template for ColGraphRAG.
# Copy to paths.yaml for local overrides (paths.yaml may be gitignored).
# When paths.yaml is absent, the backend falls back to this file automatically.
#
# Repo root = directory that contains data/, result/, models/, pattern.py, …
# It is inferred as three levels above this file (demo/be/config → colgraphrag_webqa).

version: 1

# Override package root (empty = auto)
repo_root: ""

run:
  # WebQA run root — "latest" picks the newest subdir under result_root by mtime.
  run_id: "latest"
  # Where to scan for WebQA runs (relative to repo_root).
  result_root: "result/webqa"
  # Override: use this exact directory as the run root (relative or absolute).
  explicit_result_dir: ""

webqa:
  data_root: "data/webqa"
  shard14_slice: "data/webqa/webqa_shard14_toy/webqa_slice"
  imgs_dir: "data/webqa/WebQA_imgs_7z_chunks/imgs/all_png/shard_00014"
  # Optional: full train/val JSON for pattern phase (default: under WEBQA_DATA_ROOT)
  train_val_json: ""

models:
  gemma: "models/mllm/gemma-4-E4B-it"
  colembed: "models/retriever/llama-nemotron-colembed-vl-3b-v2"
  fluency_bart: "models/eval/bart-large-cnn"

# Subdirs inside result/<run_id>/ (usually do not change).
# Phase-4 graphs: ``construct.py`` defaults to ``phase4_graphs_real``; notebooks often set
# ``phase4_graphs_out``. The demo BE accepts either when it finds ``*_graph.graphml`` files.
result_layout:
  webqa_slice: "webqa_slice"
  phase4_graphs_out: "phase4_graphs_out"
  phase5_inference: "phase5_inference"

mmqa:
  # "latest": newest run under result_root that has phase5_inference/predictions.json
  # (finished pipeline). If none, falls back to newest directory by mtime.
  # Or set a fixed run id, e.g. "20260511_080917_n5"
  run_id: "latest"
  result_root: "result/multimodalqa"
  slice_dir: "mmqa_slice"
  imgs_dir: "data/multimodalqa/final_dataset_images"
